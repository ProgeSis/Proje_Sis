<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio Conexão Regional</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#3a7bd5,#00d2ff);
}

header{
    text-align:center;
    color:white;
    padding:30px;
}

h1{
    margin:0;
    font-size:40px;
}

.container{
    background:white;
    width:85%;
    margin:30px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.2);
}

#map{
    height:500px;
    border-radius:15px;
}

.popup-content{
    text-align:center;
}

.instagram-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#ff74a3;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.instagram-btn:hover{
    background:#da7c9e;
}

footer{
    text-align:center;
    color:white;
    padding:20px;
}

</style>
</head>

<body>

<header>
    <h1>📻 Rádio Conexão Regional</h1>
    <p>Mapa interativo das rádios da região</p>
</header>

<div class="container">

    <h2>📍 Mapa Interativo</h2>

    <div id="map"></div>

</div>

<footer>
    <p>Rádio Conexão Regional © 2026</p>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// Criando mapa
var map = L.map('map').setView([-14.793, -39.046], 11);

// Camada do OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);


// Rádio Bahiana
L.marker([-14.7898, -39.0485]).addTo(map)
.bindPopup(`
<div class="popup-content">
<h3>📻 Rádio Bahiana 1310 AM</h3>

<p>
A Rádio Bahiana de Ilhéus (AM 1310) foi fundada em 10 de fevereiro de 1961 pelo empresário Robert Assef. A emissora consolidou-se na região Sul da Bahia como um importante veículo focado em jornalismo popular, prestação de serviços e forte cobertura do esporte local.
Você pode acompanhar a programação, acompanhar os comunicadores ou ver mais sobre a história atualizada da emissora sintonizando na frequência 1310 AM ou acessando os perfis oficiais nas redes sociais, como o Instagram da Rádio Bahiana de Ilhéus. Para escutar via internet de qualquer lugar, basta utilizar plataformas parceiras como a página da emissora no Radios.com.br.
</p>

<a class="instagram-btn"
href="https://www.instagram.com/radiobahiana/"
target="_blank">

📸 Instagram
</a>
</div>
`);


// Rádio Morena FM
L.marker([-14.8057, -39.2766]).addTo(map)
.bindPopup(`
<div class="popup-content">
<h3>📻 Rádio Morena FM</h3>

<p>
A Morena FM é uma emissora de rádio localizada em Itabuna, no sul da Bahia, reconhecida por sua programação musical diversificada e por levar informação e entretenimento aos ouvintes da região. A rádio transmite conteúdos voltados para música, notícias locais, cultura e interação com o público, mantendo forte presença no cotidiano da comunidade itabunense. Com uma programação dinâmica e popular, a Morena FM se destaca como um importante meio de comunicação regional, aproximando os ouvintes através do rádio e das plataformas digitais.
</p>

<a class="instagram-btn"
href="https://www.instagram.com/morenafm987?igsh=MWMzb2R6cmNoMTlmNw=="
target="_blank">

📸 Instagram
</a>
</div>
`);


// Gabriela FM
L.marker([-14.8224, -39.0807]).addTo(map)
.bindPopup(`
<div class="popup-content">
<h3>📻 Gabriela FM 102.9</h3>

<p>
A Gabriela FM é uma das emissoras de rádio mais conhecidas do sul da Bahia, transmitindo na frequência 102.9 FM diretamente da cidade de Ilhéus. A rádio possui uma programação variada, com músicas, notícias, entretenimento e programas ao vivo voltados para diferentes públicos. Conhecida pelo slogan “É ela que faz a sua trilha sonora”, a emissora se destaca pela forte conexão com os ouvintes da região e pela cobertura de acontecimentos locais. Além da transmissão tradicional, a Gabriela FM também pode ser ouvida pela internet e pelas redes sociais.
</p>

<a class="instagram-btn"
href="https://www.instagram.com/radiogabrielafm?igsh=M3Q2bzRkYTRzZGpv"
target="_blank">

📸 Instagram
</a>
</div>
`);

</script>

</body>
</html>
